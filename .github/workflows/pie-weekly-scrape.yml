name: PIE Weekly Browserbase Scrape

on:
  schedule:
    # 4 weekly runs (Saturdays) staggered to spread Browserbase hours
    # Week 1 & 3: High-deficit territories (NJ, NY Metro, North East)
    # Week 2 & 4: Medium-deficit territories (Central Atlantic, Central, South East, CA)
    - cron: '0 10 * * 6'  # Every Saturday at 6am ET (10:00 UTC)
  workflow_dispatch:
    inputs:
      territory:
        description: 'Target specific territory (leave blank for auto gap analysis)'
        required: false
        type: string
      max_per_territory:
        description: 'Max OEM targets per territory'
        required: false
        default: '50'
        type: string
      mode:
        description: 'Scrape mode'
        required: false
        default: 'real'
        type: choice
        options:
          - real
          - simulated
      max_minutes:
        description: 'Max Browserbase minutes for this run'
        required: false
        default: '1500'
        type: string
      force_territory:
        description: 'Force scrape even if territory is above average'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
  BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hour max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright openpyxl browserbase
          playwright install chromium

      - name: Run PIE Scraper
        run: |
          cd scraper
          python run_scrape.py \
            --mode "${{ inputs.mode || 'real' }}" \
            --max-per-territory "${{ inputs.max_per_territory || '50' }}" \
            --max-minutes "${{ inputs.max_minutes || '1500' }}" \
            ${{ inputs.territory && format('--territory "{0}"', inputs.territory) || '--all-gaps' }} \
            ${{ inputs.force_territory == 'true' && '--force' || '' }}

      - name: Upload scrape results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scrape-results-${{ github.run_number }}
          path: |
            scraper/output/*.csv
            scraper/output/*.json
          retention-days: 90

      - name: Commit results to repo
        if: success()
        run: |
          git config user.name "PIE Scraper Bot"
          git config user.email "pie-scraper@informativ.com"

          # Only commit if there are new files
          if [ -n "$(ls scraper/output/*.csv 2>/dev/null)" ]; then
            git add scraper/output/
            git commit -m "PIE scrape: $(date +%Y-%m-%d) — $(cat scraper/output/run_summary.txt 2>/dev/null || echo 'completed')" || echo "No changes to commit"
            git push
          fi

      - name: Post run summary
        if: always()
        run: |
          if [ -f scraper/output/run_summary.txt ]; then
            echo "### PIE Scrape Results" >> $GITHUB_STEP_SUMMARY
            cat scraper/output/run_summary.txt >> $GITHUB_STEP_SUMMARY
          fi
